---
name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/deploy.yml"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  EXPECTED_DISTS: 93
  EXPECTED_WHEELS_SHA: e8f284ebb38cb5f96df7aefc6a56460bcfc9ac7f
  FORCE_COLOR: 1

jobs:
  build-wheels:
    name: "${{ matrix.os }}: ${{ matrix.cibw_arch }} ${{ matrix.manylinux_image }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cibw_arch: "auto"
          - os: windows-11-arm
            cibw_arch: "ARM64"
          - os: macos-latest
            cibw_arch: "x86_64 arm64"
          # Linux is built in two batches so we ship both wheel variants (#741).
          # Batch 1: manylinux_2_28 (newer gcc, ~+8% faster; modern systems
          # prefer it via the higher platform tag). This batch also carries
          # musllinux and the i686 build (i686 has no manylinux_2_28 image, so
          # it stays manylinux2014 - see CIBW_MANYLINUX_I686_IMAGE below).
          - os: ubuntu-latest
            cibw_arch: "x86_64 i686"
            manylinux_image: manylinux_2_28
          - os: ubuntu-24.04-arm
            cibw_arch: aarch64
            manylinux_image: manylinux_2_28
          # Batch 2: manylinux2014 (glibc 2.17 compatibility) for x86_64 and
          # aarch64 only; musllinux is skipped as it's already built in batch 1.
          - os: ubuntu-latest
            cibw_arch: x86_64
            manylinux_image: manylinux2014
            cibw_skip_extra: "*-musllinux_*"
          - os: ubuntu-24.04-arm
            cibw_arch: aarch64
            manylinux_image: manylinux2014
            cibw_skip_extra: "*-musllinux_*"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: git fetch --prune --unshallow

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      # https://github.com/pypa/cibuildwheel
      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        with:
          output-dir: dist
        # Options are supplied via environment variables:
        env:
          # Build wheels for the currently selected architecture.
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          # x86_64 and aarch64 are built once per manylinux image (see matrix)
          # so we ship both manylinux2014 and manylinux_2_28 variants (#741).
          # Empty (and ignored) on Windows/macOS.
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image }}
          CIBW_MANYLINUX_AARCH64_IMAGE: ${{ matrix.manylinux_image }}
          CIBW_MANYLINUX_PYPY_X86_64_IMAGE: ${{ matrix.manylinux_image }}
          CIBW_MANYLINUX_PYPY_AARCH64_IMAGE: ${{ matrix.manylinux_image }}
          # i686 has no manylinux_2_28 image, so it's always manylinux2014.
          CIBW_MANYLINUX_I686_IMAGE: manylinux2014
          CIBW_MANYLINUX_PYPY_I686_IMAGE: manylinux2014
          # Include latest Python beta.
          CIBW_ENABLE: cpython-prerelease pypy graalpy
          # Skip EOL Python versions and macOS x86_64 GraalPy, which times out
          # during first-time interpreter discovery on GitHub Actions runners.
          # The manylinux2014 batch also skips musllinux (built in the 2_28 batch).
          CIBW_SKIP: "gp311* gp*-macosx_x86_64 ${{ matrix.cibw_skip_extra }}"
          # Run the test suite after each build.
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: pytest {package}/tests
          # GraalPy has a bug with progress bar rendering in pip
          PIP_PROGRESS_BAR: "off"

      - name: Upload as build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: dist/*.whl

  build-sdist-and-upload:
    runs-on: ubuntu-latest
    needs: ['build-wheels']
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
            git fetch --prune --unshallow

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -U build twine

      - name: Download wheels from build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist-wheels/

      - name: Build package
        run: |
          git tag
          python -m build --sdist
          twine check --strict dist/*
          twine check --strict dist-wheels/*

      - name: "What did we get?"
        run: |
          ls -alR dist dist-wheels
          echo "Number of dists, should be $EXPECTED_DISTS:"
          files=$(find dist dist-wheels -type f | wc -l)
          echo "$files"
          [ "$files" -eq "$EXPECTED_DISTS" ] || exit 1
          echo "Wheel fingerprint, should be $EXPECTED_WHEELS_SHA:"
          fingerprint=$(find dist-wheels -maxdepth 1 -type f -printf '%f\n' | sed -E 's/^ujson-[^-]+-//' | LC_ALL=C sort | sha1sum | cut -d' ' -f1)
          echo "$fingerprint"
          [ "$fingerprint" = "$EXPECTED_WHEELS_SHA" ] || exit 1

      - name: Publish wheels to PyPI
        if: github.event.action == 'published'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist-wheels/

      - name: Publish sdist to PyPI
        if: github.event.action == 'published'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Publish wheels to TestPyPI
        if: |
          github.repository == 'ultrajson/ultrajson' &&
          github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-wheels/

      - name: Publish sdist to TestPyPI
        if: |
          github.repository == 'ultrajson/ultrajson' &&
          github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
