name: Test

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "graalpy-25"
          - "pypy3.11"
          - "3.15t"
          - "3.15"
          - "3.14t"
          - "3.14"
          - "3.13t"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
        os: [ubuntu-latest]
        include:
          - { python-version: "pypy-3.11", os: windows-latest }
          - { python-version: "pypy-3.11", os: macos-latest }
          - { python-version: "3.14", os: windows-latest }
          - { python-version: "3.14", os: macos-latest }
          - { python-version: "3.15", os: windows-latest }
          - { python-version: "3.15", os: macos-latest }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: "setup.py"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -U pytest
          python -m pip install .
        env:
          CFLAGS: '-DDEBUG'

      - name: Tests
        run: |
          python -m pytest --capture=no

      - name: Test without debug mode
        run: |
          git clean -Xfd
          python -m pip install --force-reinstall .
          python -m pytest

      - name: Test with coverage
        if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.python-version == '3.10' }}
        run: |
          pip install -e .
          pip install coverage setuptools_scm
          CFLAGS="--coverage -O0" CXXFLAGS="--coverage -O0" python setup.py -q build_ext --inplace -f
          coverage run -m pytest
          ./scripts/coverage.sh

      - name: Upload coverage
        if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.python-version == '3.10' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          plugins: pycoverage

      - name: Test with leak detection
        if: "!startsWith(matrix.python-version, 'pypy') && !startsWith(matrix.python-version, 'graalpy') && !endsWith(matrix.python-version, 't')"
        run: python -m pytest --leak-max-loops=5000 -v

  cross-arch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [ppc64le, s390x, aarch64, arm/v6, 386]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: git fetch --prune --unshallow

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Test
        run: |
          docker run -v "$PWD:/io" --platform=linux/${{ matrix.architecture }} python:alpine ash -e -c '
            apk add gcc g++ musl-dev git
            cd /io
            git config --global --add safe.directory /io
            pip install . pytest
            FORCE_COLOR=1 pytest
          '

  success:
    needs: [test, cross-arch]
    runs-on: ubuntu-latest
    name: test successful
    steps:
      - name: Success
        run: echo Test successful
